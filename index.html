<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>For Misoji</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --deep-blue:   #0f1e36; /* Deep midnight blue for pristine high-contrast reading */
    --royal-blue:  #1d4ed8; /* Vibrant sapphire blue for highlights and accents */
    --light-blue:  #3b82f6; /* Bright, non-dark blue for gradients */
    --sky-blue:    #60a5fa; /* Soft sky blue for interactive effects */
    --warm-cream:  #f8fafc; /* Crisp, clean, premium background backing */
    --deeptext:    #0a1526; 
  }

  html, body { width: 100%; height: 100%; overflow: hidden; position: fixed; }

  body {
    /* LIVING BLUE SUNLIGHT ENGINE */
    background: linear-gradient(-45deg, #f1f5f9, #f8fafc, #e0f2fe, #f0fdfa);
    background-size: 400% 400%;
    animation: sunlightShift 22s ease infinite;
    color: var(--deep-blue);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  @keyframes sunlightShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── CANVASES ── */
  canvas { position: fixed; inset: 0; pointer-events: none; }
  #bgCanvas { z-index: 0; }
  #nebulaCanvas { z-index: 1; }
  #ptCanvas { z-index: 2; }
  #interactiveCanvas { z-index: 11; } 

  /* ── DYNAMIC BLUE AMBIENT CLOUDS ── */
  .aurora {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    border-radius: 50%;
    filter: blur(100px);
    mix-blend-mode: multiply;
    opacity: 0.25; 
  }
  .au1 {
    width: min(500px,120vw); height: min(250px,50vw);
    background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(96,165,250,0.1), transparent);
    top: -20px; left: -20px;
  }
  .au2 {
    width: min(400px,110vw); height: min(200px,45vw);
    background: linear-gradient(225deg, rgba(29,78,216,0.08), rgba(248,250,252,0.4), transparent);
    bottom: -20px; right: -20px;
  }

  /* ── RINGS ── */
  .ring {
    position: fixed;
    width: min(320px,85vw); height: min(320px,85vw);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    z-index: 2;
    pointer-events: none;
  }
  .ring:nth-child(1){ border:1px solid rgba(59,130,246,0.14); animation:ring 12s 0.5s ease-out infinite; }
  .ring:nth-child(2){ border:1px solid rgba(96,165,250,0.12); animation:ring 12s 5.5s ease-out infinite; }
  @keyframes ring {
    0%  { transform:translate(-50%,-50%) scale(0.5); opacity:0.8; }
    100%{ transform:translate(-50%,-50%) scale(2.2); opacity:0; }
  }

  /* ── CORNERS ── */
  .corner {
    position: fixed; width:32px; height:32px;
    pointer-events:none; z-index:6; opacity:0;
    transition: opacity 1.5s 2s ease;
  }
  .corner svg { width:100%; height:100%; }
  .c-tl { top:16px; left:16px; }
  .c-tr { top:16px; right:16px; transform:scaleX(-1); }
  .c-bl { bottom:16px; left:16px; transform:scaleY(-1); }
  .c-br { bottom:16px; right:16px; transform:scale(-1,-1); }
  @media(max-width:480px){ .corner{ display:none; } }

  /* ── MOBILE-OPTIMIZED CARD CONTAINER ── */
  .card {
    position:relative; z-index:10; text-align:center;
    width: min(580px, 90vw);
    max-height: 92vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: clamp(2rem, 6vh, 4rem) clamp(1.25rem, 5vw, 3rem);
    background: rgba(255, 255, 255, 0.92); 
    border-radius: 20px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(59, 130, 246, 0.14);
    box-shadow: 0 20px 50px rgba(15, 30, 54, 0.05);
  }
  .card::-webkit-scrollbar { width: 0px; background: transparent; }

  .eyebrow {
    font-size: clamp(0.75rem, 2.2vw, 0.95rem);
    font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--royal-blue); 
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    margin-bottom: clamp(1rem, 4vh, 2rem);
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.2rem, 11vw, 5.5rem);
    font-weight: 700; line-height: 1.1; 
    color: var(--deep-blue);
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.9s 0.2s ease, transform 0.9s 0.2s ease;
    margin-bottom: 0.2rem;
  }
  .headline em {
    font-style: italic; font-weight: 700;
    background: linear-gradient(90deg, var(--deep-blue), var(--light-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* DIVIDER */
  .divider {
    position: relative; height: 1px; 
    margin: clamp(1.5rem, 4vh, 2.2rem) auto;
    width: 0; max-width: 200px;
    background: linear-gradient(90deg, transparent, rgba(29,78,216,0.3), rgba(96,165,250,0.4), transparent);
    transition: width 1.2s 0.5s cubic-bezier(0.22,1,0.36,1);
  }
  .divider.open { width: 200px; }

  /* MESSAGE */
  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 4.8vw, 2.1rem);
    font-weight: 400;
    font-style: italic; line-height: 1.5;
    color: rgba(15, 30, 54, 0.85); 
    margin-bottom: 0px;
    word-spacing: normal; letter-spacing: 0.005em;
    transition: margin 0.5s ease, color 0.5s ease;
  }
  .message.expanded {
    margin-bottom: clamp(1.8rem, 5vh, 2.8rem);
    color: var(--deeptext); 
  }
  .w {
    display: inline; opacity: 0; filter: blur(2px);
    transition: opacity 0.4s ease, filter 0.4s ease;
  }
  .w.on  { opacity: 1; filter: blur(0); }
  .w.str {
    font-style: normal; font-weight: 700;
    background: linear-gradient(90deg, var(--royal-blue), var(--light-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* HIDDEN WRAPPER CONTAINER */
  .hidden-content {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
  }
  .hidden-content.reveal {
    max-height: 400px;
    opacity: 1;
  }

  /* WISH */
  .wish {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.7rem, 5.8vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(120deg, var(--deep-blue), var(--royal-blue), var(--light-blue), var(--deep-blue));
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 7s linear infinite;
    margin-bottom: 0.4rem; line-height: 1.3;
  }
  @keyframes shimmer { to { background-position: 300% center; } }

  /* NAME */
  .namesign {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 7vw, 3.4rem);
    font-style: italic; font-weight: 700;
    background: linear-gradient(90deg, var(--deep-blue), var(--royal-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: clamp(1.4rem, 4vh, 2rem);
    letter-spacing: 0.02em;
  }

  /* NOTE */
  .note {
    font-size: clamp(0.8rem, 2.2vw, 1rem);
    font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--royal-blue);
    line-height: 1.4;
    padding: 0 10px;
  }

  /* ── HIGHLY DYNAMIC ATTENTION & CURIOSITY BUTTON ── */
  .btn-container {
    position: relative;
    display: inline-block;
    margin-top: clamp(1.8rem, 5vh, 2.8rem);
  }

  .action-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #2563eb, #3b82f6, #60a5fa, #1d4ed8);
    background-size: 300% 100%;
    color: #ffffff;
    border: none;
    padding: clamp(15px, 4.2vw, 20px) clamp(26px, 6.5vw, 40px);
    font-size: clamp(0.75rem, 2.2vw, 0.85rem);
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-radius: 50px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease, box-shadow 0.4s, background-position 0.4s;
    outline: none;
    z-index: 3;
    -webkit-tap-highlight-color: transparent;
    /* Composite dynamic animations for attention pulling */
    animation: magneticPulse 2s infinite ease-in-out, fluidGlow 4s linear infinite;
  }

  /* Infinite attention glow shifts */
  @keyframes fluidGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Subtle elastic scaling to mimic a living breathing cue */
  @keyframes magneticPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  /* Dynamic expanding ring radiating out from the button */
  .btn-ripple {
    position: absolute;
    inset: 0;
    border-radius: 50px;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    border: 2px solid rgba(59, 130, 246, 0.4);
    transform: scale(1);
    transition: opacity 0.3s;
  }
  
  .action-btn.show ~ .btn-ripple {
    animation: rippleWave 2.4s infinite cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes rippleWave {
    0% { transform: scale(0.96); opacity: 0; }
    15% { opacity: 0.65; }
    70% { opacity: 0; }
    100% { transform: scale(1.22, 1.35); opacity: 0; }
  }

  .action-btn .smiley {
    font-size: clamp(1.1rem, 3.5vw, 1.35rem);
    letter-spacing: normal;
    display: inline-block;
    transform-origin: center bottom;
    animation: smileyWobble 1.5s infinite alternate ease-in-out;
  }

  .action-btn span.arrow {
    display: inline-block;
    font-weight: 900;
    animation: arrowSlide 0.8s infinite alternate ease-in-out;
  }

  /* Micro-interactions on active touches/hovers */
  @media(hover: hover) {
    .action-btn:hover {
      background-position: 60% center;
      box-shadow: 0 15px 35px rgba(29, 78, 216, 0.35), 0 0 22px rgba(96, 165, 250, 0.5);
      transform: scale(1.05) translateY(-1px);
    }
  }

  .action-btn:active {
    transform: scale(0.97);
    box-shadow: 0 5px 15px rgba(29, 78, 216, 0.4);
  }

  @keyframes arrowSlide {
    0% { transform: translateX(0); }
    100% { transform: translateX(5px); }
  }

  @keyframes smileyWobble {
    0% { transform: scale(1) rotate(-6deg); }
    100% { transform: scale(1.18) rotate(8deg); }
  }

  .show { opacity: 1 !important; transform: none !important; }
  
  /* Smooth collapse transition upon interaction click */
  .hide-btn-container {
    opacity: 0 !important;
    transform: scale(0.4) !important;
    pointer-events: none !important;
    margin-top: 0px !important;
    height: 0px !important;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="nebulaCanvas"></canvas>
<canvas id="ptCanvas"></canvas>
<canvas id="interactiveCanvas"></canvas>

<div class="aurora au1"></div>
<div class="aurora au2"></div>

<div class="ring"></div>
<div class="ring"></div>

<div class="corner c-tl"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(59,130,246,0.4)"/></svg></div>
<div class="corner c-tr"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(96,165,250,0.25)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(59,130,246,0.4)"/></svg></div>
<div class="corner c-bl"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(96,165,250,0.25)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(59,130,246,0.4)"/></svg></div>
<div class="corner c-br"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(59,130,246,0.4)"/></svg></div>

<div class="card">
  <p class="eyebrow" id="ey">a little note, just for </p>
  <h1 class="headline" id="hl">You <em></em></h1>
  <div class="divider" id="dv"></div>
  <p class="message" id="msg"></p>
  
  <div class="btn-container" id="btnContainer">
    <button class="action-btn" id="actBtn" onclick="unlockSmile(event)">
      click to unlock your smile <span class="smiley">😉👍</span><span class="arrow">→</span>
    </button>
    <div class="btn-ripple"></div>
  </div>

  <!-- HIDDEN CONTENT SECTION -->
  <div class="hidden-content" id="secretContent">
    <p class="wish" id="wsh">Wishing you nice exams —</p>
    <span class="namesign" id="nm">Misoji.</span>
    <p class="note" id="nt">you already know more than you think</p>
  </div>
</div>

<script>
/* ── DYNAMIC CONTENT ENGINE (URL PARSER) ── */
const urlParams = new URLSearchParams(window.location.search);

const customName = urlParams.get('name') || "You";
const customHeadline = urlParams.get('headline') || "";
const customWish = urlParams.get('wish') || "Wishing you nice exams —";
const customSign = urlParams.get('sign') || "Misoji.";
const customNote = urlParams.get('note') || "you already know more than you think";
const customMessage = urlParams.get('message') || "You've already proven you know how to find your way through.*This exam is no different.";

document.getElementById('hl').innerHTML = `${customName} <em>${customHeadline}</em>`;
document.getElementById('wsh').textContent = customWish;
document.getElementById('nm').textContent = customSign;
document.getElementById('nt').textContent = customNote;

/* ── GENERATE TIMED WORD ELEMENTS ── */
const msgEl = document.getElementById('msg');
const allWords = [];
const textLines = customMessage.split('*'); 

textLines.forEach((lineStr, li) => {
  if (li > 0) msgEl.appendChild(document.createElement('br'));
  
  const wordsArray = lineStr.split(' ');
  wordsArray.forEach((wordText, wi) => {
    if (wi > 0) msgEl.appendChild(document.createTextNode(' '));
    
    const span = document.createElement('span');
    span.className = 'w' + (li === textLines.length - 1 ? ' str' : '');
    span.textContent = wordText;
    msgEl.appendChild(span);
    allWords.push(span);
  });
});

/* ── CANVAS SETUP & PROPERTIES ── */
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
const nbC = document.getElementById('nebulaCanvas');
const nbX = nbC.getContext('2d');
const ptC = document.getElementById('ptCanvas');
const ptX = ptC.getContext('2d');
const intC = document.getElementById('interactiveCanvas');
const intX = intC.getContext('2d');

let mouse = { x: -1000, y: -1000, active: false, px: -1000, py: -1000, vx: 0, vy: 0 };

function resize() {
  bgC.width = nbC.width = ptC.width = intC.width = window.innerWidth;
  bgC.height = nbC.height = ptC.height = intC.height = window.innerHeight;
  drawNebula();
}
resize();
window.addEventListener('resize', resize);

function drawNebula() {
  nbX.clearRect(0, 0, nbC.width, nbC.height);
  const blobs = [
    { x:0.15, y:0.2,  r:0.4, c:'rgba(59,130,246,0.05)' },
    { x:0.8,  y:0.75, r:0.4, c:'rgba(96,165,250,0.04)' }
  ];
  blobs.forEach(b => {
    const grd = nbX.createRadialGradient(
      b.x * nbC.width, b.y * nbC.height, 0,
      b.x * nbC.width, b.y * nbC.height, b.r * Math.max(nbC.width, nbC.height)
    );
    grd.addColorStop(0, b.c);
    grd.addColorStop(1, 'transparent');
    nbX.fillStyle = grd;
    nbX.fillRect(0, 0, nbC.width, nbC.height);
  });
}

/* ── BACKSTAGE STARFIELD ENTITIES ── */
const starColors = [[15,30,54], [29,78,216], [59,130,246]];
const stars = Array.from({length:45}, () => { 
  const col = starColors[Math.floor(Math.random() * starColors.length)];
  return {
    x:  Math.random() * window.innerWidth,
    y:  Math.random() * window.innerHeight,
    ox: 0, oy: 0, 
    r:  Math.random() * 1.2 + 0.6,
    op: Math.random() * 0.35 + 0.2,
    sp: Math.random() * 0.005 + 0.002,
    ph: Math.random() * Math.PI * 2,
    col
  };
});

function drawStars(t) {
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  stars.forEach(s => {
    if (mouse.active) {
      const dx = mouse.x - s.x;
      const dy = mouse.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const force = (120 - dist) / 120;
        s.ox += (mouse.vx * force * 0.8 - s.ox) * 0.08;
        s.oy += (mouse.vy * force * 0.8 - s.oy) * 0.08;
      } else {
        s.ox += (0 - s.ox) * 0.04;
        s.oy += (0 - s.oy) * 0.04;
      }
    } else {
      s.ox += (0 - s.ox) * 0.04;
      s.oy += (0 - s.oy) * 0.04;
    }

    const a = s.op * (0.4 + 0.6 * Math.sin(t * s.sp + s.ph));
    const [r,g,b] = s.col;
    bgX.beginPath();
    bgX.arc(s.x + s.ox, s.y + s.oy, s.r, 0, Math.PI*2);
    bgX.fillStyle = `rgba(${r},${g},${b},${a.toFixed(3)})`;
    bgX.fill();
  });
}

/* ── CONSTANT BACKGROUND FLOATERS ── */
const ptColors = ['rgba(59,130,246,', 'rgba(29,78,216,'];
const syms = ['✦','·','✧'];
const pts = Array.from({length:8}, () => ({ 
  x:  Math.random() * window.innerWidth,
  y:  Math.random() * window.innerHeight + window.innerHeight,
  sz: Math.random() * 1.4 + 1,
  vy: -(Math.random() * 0.18 + 0.08),
  vx: (Math.random() - 0.5) * 0.05,
  op: Math.random() * 0.25 + 0.15,
  s:  syms[Math.floor(Math.random() * syms.length)],
  col: ptColors[Math.floor(Math.random() * ptColors.length)]
}));

function drawPts() {
  ptX.clearRect(0, 0, ptC.width, ptC.height);
  pts.forEach(p => {
    p.y += p.vy;
    p.x += p.vx;
    if (p.y < -20) { p.y = ptC.height + 20; p.x = Math.random() * ptC.width; }
    ptX.font = `${p.sz * 9}px serif`;
    ptX.fillStyle = p.col + p.op + ')';
    ptX.fillText(p.s, p.x, p.y);
  });
}

/* ── SHOOTING STREAKS ── */
let shoot = null;
function launchShoot() {
  shoot = { x: Math.random() * 0.6, y: Math.random() * 0.3, len: Math.random() * 0.08 + 0.04, speed: Math.random() * 0.003 + 0.002, op: 0.5 };
}
setTimeout(launchShoot, 3000);
setInterval(launchShoot, 16000 + Math.random() * 9000);

function drawShoot() {
  if (!shoot) return;
  shoot.x += shoot.speed;
  shoot.y += shoot.speed * 0.45;
  shoot.op -= 0.015;
  if (shoot.op <= 0) { shoot = null; return; }
  const x1 = shoot.x * bgC.width;
  const y1 = shoot.y * bgC.height;
  const x0 = x1 - shoot.len * bgC.width;
  const y0 = y1 - shoot.len * bgC.height * 0.45;
  const grd = bgX.createLinearGradient(x0, y0, x1, y1);
  grd.addColorStop(0, `rgba(255,255,255,0)`);
  grd.addColorStop(1, `rgba(59,130,246,${shoot.op})`);
  bgX.beginPath();
  bgX.moveTo(x0, y0);
  bgX.lineTo(x1, y1);
  bgX.strokeStyle = grd;
  bgX.lineWidth = 1.0;
  bgX.stroke();
}

/* ── INTERACTIVE BLUE EMBER TRAIL ── */
let trailParticles = [];
const interactiveGradients = ['rgba(59,130,246,', 'rgba(29,78,216,', 'rgba(96,165,250,'];
const interactiveShapes = ['✦', '✧'];

function trackActivity(nx, ny) {
  if (mouse.px !== -1000) {
    mouse.vx = nx - mouse.px;
    mouse.vy = ny - mouse.py;
  }
  mouse.px = mouse.x = nx;
  mouse.py = mouse.y = ny;
  mouse.active = true;

  const movementSpeed = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
  const spawnCount = Math.min(Math.floor(movementSpeed * 0.15) + 1, 2);

  for(let i = 0; i < spawnCount; i++) {
    trailParticles.push({
      x: nx + (Math.random() - 0.5) * 6,
      y: ny + (Math.random() - 0.5) * 6,
      size: Math.max(12 - movementSpeed * 0.15, 6) + Math.random() * 4, 
      vx: (Math.random() - 0.5) * 0.8 + mouse.vx * 0.08,
      vy: (Math.random() - 0.5) * 0.8 - 0.2 + mouse.vy * 0.08, 
      shape: interactiveShapes[Math.floor(Math.random() * interactiveShapes.length)],
      color: interactiveGradients[Math.floor(Math.random() * interactiveGradients.length)],
      alpha: 0.8,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.08
    });
  }
}

/* ── UNLOCK SHOCKWAVE INTERACTION ── */
function unlockSmile(e) {
  e.preventDefault();
  const container = document.getElementById('btnContainer');
  const btn = document.getElementById('actBtn');
  const msg = document.getElementById('msg');
  const secret = document.getElementById('secretContent');
  
  container.classList.add('hide-btn-container');
  msg.classList.add('expanded');
  
  const rect = btn.getBoundingClientRect();
  const startX = rect.left + rect.width / 2;
  const startY = rect.top + rect.height / 2;

  for (let i = 0; i < 35; i++) {
    const angle = (Math.PI * 2 / 35) * i + (Math.random() - 0.5) * 0.2;
    const speed = Math.random() * 4.0 + 3.0;
    trailParticles.push({
      x: startX,
      y: startY,
      size: Math.random() * 8 + 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.1,
      shape: interactiveShapes[Math.floor(Math.random() * interactiveShapes.length)],
      color: interactiveGradients[Math.floor(Math.random() * interactiveGradients.length)],
      alpha: 1.0,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.25
    });
  }

  setTimeout(() => {
    secret.classList.add('reveal');
  }, 250);
}

window.addEventListener('mousemove', (e) => trackActivity(e.clientX, e.clientY));
window.addEventListener('touchmove', (e) => {
  if(e.touches.length > 0) trackActivity(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });
window.addEventListener('mouseleave', () => { mouse.active = false; mouse.px = mouse.py = -1000; });
window.addEventListener('touchend', () => { mouse.active = false; mouse.px = mouse.py = -1000; });

function drawInteractiveTrail() {
  intX.clearRect(0, 0, intC.width, intC.height);
  
  mouse.vx *= 0.90;
  mouse.vy *= 0.90;

  for (let i = trailParticles.length - 1; i >= 0; i--) {
    let p = trailParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.02; 
    p.rotation += p.rotationSpeed;
    
    if (p.alpha <= 0) {
      trailParticles.splice(i, 1);
      continue;
    }
    
    intX.save();
    intX.translate(p.x, p.y);
    intX.rotate(p.rotation);
    intX.font = `${p.size}px Arial`;
    intX.fillStyle = p.color + p.alpha + ')';
    intX.textAlign = 'center';
    intX.textBaseline = 'middle';
    intX.fillText(p.shape, 0, 0);
    intX.restore();
  }
}

/* ── ANIMATION LOOP ── */
let t = 0;
(function loop() {
  t++;
  drawStars(t);
  drawShoot();
  drawPts();
  drawInteractiveTrail();
  requestAnimationFrame(loop);
})();

const buttonDelay = 1600 + allWords.length * 95 + 500 + 350;
setTimeout(() => $('actBtn').classList.add('show'), buttonDelay);
</script>
