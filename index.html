<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>For Misoji</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:   #f9d84a;
    --amber:  #f4a541;
    --rose:   #e07aa0;
    --violet: #9b6fd4;
    --sky:    #5bb8f5;
    --cream:  #fdf6ee;
    --muted:  rgba(253,246,238,0.52);
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: #060b18;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── CANVASES ── */
  canvas { position: fixed; inset: 0; pointer-events: none; }
  #bgCanvas { z-index: 0; }
  #nebulaCanvas { z-index: 1; }
  #ptCanvas { z-index: 2; }

  /* ── AURORA BANDS ── */
  .aurora {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    border-radius: 50%;
    filter: blur(70px);
    mix-blend-mode: screen;
  }
  .au1 {
    width: min(700px,130vw); height: min(320px,60vw);
    background: linear-gradient(135deg, rgba(91,184,245,0.18), rgba(155,111,212,0.22), transparent);
    top: -60px; left: -80px;
    animation: auA 16s ease-in-out infinite;
  }
  .au2 {
    width: min(600px,120vw); height: min(280px,55vw);
    background: linear-gradient(225deg, rgba(224,122,160,0.2), rgba(244,165,65,0.15), transparent);
    bottom: -60px; right: -80px;
    animation: auB 20s ease-in-out infinite;
  }
  .au3 {
    width: min(400px,90vw); height: min(400px,90vw);
    background: radial-gradient(circle, rgba(155,111,212,0.12) 0%, transparent 70%);
    top: 30%; left: 50%; transform: translate(-50%,-50%);
    animation: auC 12s ease-in-out infinite;
  }
  @keyframes auA { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(60px,30px) scale(1.08);} }
  @keyframes auB { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-50px,-25px) scale(1.1);} }
  @keyframes auC { 0%,100%{opacity:0.7; transform:translate(-50%,-50%) scale(1);} 50%{opacity:1; transform:translate(-50%,-50%) scale(1.2);} }

  /* ── RINGS ── */
  .ring {
    position: fixed;
    width: min(340px,78vw); height: min(340px,78vw);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    z-index: 2;
    pointer-events: none;
  }
  .ring:nth-child(1){ border:1px solid rgba(249,216,74,0.12); animation:ring 7s 0.4s ease-out infinite; }
  .ring:nth-child(2){ border:1px solid rgba(155,111,212,0.1); animation:ring 7s 2s   ease-out infinite; }
  .ring:nth-child(3){ border:1px solid rgba(224,122,160,0.1); animation:ring 7s 3.8s ease-out infinite; }
  @keyframes ring {
    0%  { transform:translate(-50%,-50%) scale(0); opacity:0.6; }
    100%{ transform:translate(-50%,-50%) scale(4.5); opacity:0; }
  }

  /* ── CORNERS ── */
  .corner {
    position: fixed; width:48px; height:48px;
    pointer-events:none; z-index:6; opacity:0;
    transition: opacity 1.5s 2s ease;
  }
  .corner svg { width:100%; height:100%; }
  .c-tl { top:16px; left:16px; }
  .c-tr { top:16px; right:16px; transform:scaleX(-1); }
  .c-bl { bottom:16px; left:16px; transform:scaleY(-1); }
  .c-br { bottom:16px; right:16px; transform:scale(-1,-1); }
  @media(max-width:400px){ .corner{ display:none; } }

  /* ── CARD ── */
  .card {
    position:relative; z-index:10; text-align:center;
    width: min(600px,92vw);
    padding: clamp(2rem,6vw,4rem) clamp(1.4rem,5vw,3rem);
  }

  /* EYEBROW */
  .eyebrow {
    font-size: clamp(0.56rem,1.8vw,0.66rem);
    font-weight:300; letter-spacing:0.34em; text-transform:uppercase;
    color: var(--sky);
    opacity:0; transform:translateY(14px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    margin-bottom: clamp(1.2rem,4vw,2rem);
  }

  /* HEADLINE */
  .headline {
    font-family:'Cormorant Garamond',serif;
    font-size: clamp(2.4rem,10vw,5rem);
    font-weight:300; line-height:1.1; color:var(--cream);
    opacity:0; transform:translateY(18px);
    transition: opacity 1s 0.2s ease, transform 1s 0.2s ease;
    margin-bottom:0.3rem;
  }
  .headline em {
    font-style:italic; font-weight:400;
    background: linear-gradient(90deg, var(--gold), var(--amber));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }

  /* DIVIDER */
  .divider {
    position:relative; height:1px;
    margin: clamp(1.6rem,4vw,2.4rem) auto;
    width:0; max-width:200px;
    background: linear-gradient(90deg, transparent, var(--violet), var(--rose), var(--gold), transparent);
    transition: width 1.3s 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .divider::before, .divider::after {
    content:'✦'; position:absolute; top:50%; transform:translateY(-50%);
    font-size:0.45rem; opacity:0; transition: opacity 0.5s 1.8s ease;
  }
  .divider::before { left:-10px; color:var(--violet); }
  .divider::after  { right:-10px; color:var(--rose); }
  .divider.open { width:200px; }
  .divider.open::before, .divider.open::after { opacity:1; }

  /* MESSAGE */
  .message {
    font-family:'Cormorant Garamond',serif;
    font-size: clamp(1.05rem,3.5vw,1.45rem);
    font-style:italic; line-height:1.95;
    color:var(--muted);
    margin-bottom: clamp(2rem,5vw,2.8rem);
    word-spacing:normal; letter-spacing:0.01em;
  }
  .w {
    display:inline; opacity:0; filter:blur(5px);
    transition: opacity 0.5s ease, filter 0.5s ease;
  }
  .w.on  { opacity:1; filter:blur(0); }
  .w.str {
    font-style:normal; font-weight:600;
    background: linear-gradient(90deg, var(--gold), var(--amber));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }

  /* WISH */
  .wish {
    display:block;
    font-family:'Cormorant Garamond',serif;
    font-size: clamp(1.3rem,4.5vw,2rem);
    font-weight:600;
    background: linear-gradient(120deg, var(--gold), var(--rose), var(--violet), var(--sky), var(--gold));
    background-size:300% auto;
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    animation: shimmer 5s linear infinite;
    opacity:0; transform:translateY(10px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    margin-bottom:0.5rem; line-height:1.5;
  }
  @keyframes shimmer { to { background-position:300% center; } }

  /* NAME */
  .namesign {
    display:block;
    font-family:'Cormorant Garamond',serif;
    font-size: clamp(1.5rem,5.5vw,2.5rem);
    font-style:italic; font-weight:400;
    background: linear-gradient(90deg, var(--gold), var(--amber));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    opacity:0; transform:translateY(10px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    margin-bottom: clamp(1.4rem,4vw,2rem);
    letter-spacing:0.04em;
  }

  /* NOTE */
  .note {
    font-size: clamp(0.6rem,1.8vw,0.72rem);
    font-weight:200; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--muted); opacity:0; transition:opacity 1s ease;
  }

  .show { opacity:1 !important; transform:none !important; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="nebulaCanvas"></canvas>
<canvas id="ptCanvas"></canvas>

<div class="aurora au1"></div>
<div class="aurora au2"></div>
<div class="aurora au3"></div>

<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

<div class="corner c-tl"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(155,111,212,0.5)" stroke-width="1"/><circle cx="3" cy="3" r="2" fill="rgba(249,216,74,0.7)"/></svg></div>
<div class="corner c-tr"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(224,122,160,0.5)" stroke-width="1"/><circle cx="3" cy="3" r="2" fill="rgba(249,216,74,0.7)"/></svg></div>
<div class="corner c-bl"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(91,184,245,0.5)" stroke-width="1"/><circle cx="3" cy="3" r="2" fill="rgba(249,216,74,0.7)"/></svg></div>
<div class="corner c-br"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(244,165,65,0.5)" stroke-width="1"/><circle cx="3" cy="3" r="2" fill="rgba(249,216,74,0.7)"/></svg></div>

<div class="card">
  <p class="eyebrow" id="ey">a little note, just for </p>
  <h1 class="headline" id="hl">You <em></em></h1>
  <div class="divider" id="dv"></div>
  <p class="message" id="msg"></p>
  <p class="wish" id="wsh">Wishing you nice exams —</p>
  <span class="namesign" id="nm">Misoji.</span>
  <p class="note" id="nt">you already know more than you think</p>
</div>

<script>
/* ── CANVAS SETUP ── */
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
const nbC = document.getElementById('nebulaCanvas');
const nbX = nbC.getContext('2d');
const ptC = document.getElementById('ptCanvas');
const ptX = ptC.getContext('2d');

function resize() {
  bgC.width = nbC.width = ptC.width = window.innerWidth;
  bgC.height = nbC.height = ptC.height = window.innerHeight;
  drawNebula();
}
resize();
window.addEventListener('resize', resize);

/* ── NEBULA (static coloured clouds) ── */
function drawNebula() {
  nbX.clearRect(0, 0, nbC.width, nbC.height);
  const blobs = [
    { x:0.15, y:0.2,  r:0.28, c:'rgba(91,184,245,0.055)' },
    { x:0.8,  y:0.75, r:0.26, c:'rgba(155,111,212,0.07)' },
    { x:0.5,  y:0.5,  r:0.22, c:'rgba(224,122,160,0.045)'},
    { x:0.85, y:0.18, r:0.18, c:'rgba(244,165,65,0.05)'  },
    { x:0.1,  y:0.8,  r:0.2,  c:'rgba(249,216,74,0.04)'  },
  ];
  blobs.forEach(b => {
    const grd = nbX.createRadialGradient(
      b.x * nbC.width, b.y * nbC.height, 0,
      b.x * nbC.width, b.y * nbC.height, b.r * Math.max(nbC.width, nbC.height)
    );
    grd.addColorStop(0, b.c);
    grd.addColorStop(1, 'transparent');
    nbX.fillStyle = grd;
    nbX.fillRect(0, 0, nbC.width, nbC.height);
  });
}

/* ── STARS (coloured) ── */
const starColors = [
  [255,255,255], [249,216,74], [155,111,212],
  [91,184,245],  [224,122,160],[244,165,65]
];
const stars = Array.from({length:150}, () => {
  const col = starColors[Math.floor(Math.random() * starColors.length)];
  return {
    x:  Math.random(),
    y:  Math.random(),
    r:  Math.random() * 1.4 + 0.2,
    op: Math.random() * 0.7 + 0.1,
    sp: Math.random() * 0.007 + 0.002,
    ph: Math.random() * Math.PI * 2,
    col
  };
});

function drawStars(t) {
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  stars.forEach(s => {
    const a = s.op * (0.4 + 0.6 * Math.sin(t * s.sp + s.ph));
    const [r,g,b] = s.col;
    bgX.beginPath();
    bgX.arc(s.x * bgC.width, s.y * bgC.height, s.r, 0, Math.PI*2);
    bgX.fillStyle = `rgba(${r},${g},${b},${a.toFixed(3)})`;
    bgX.fill();
  });
}

/* ── PARTICLES (coloured) ── */
const ptColors = ['rgba(249,216,74,', 'rgba(155,111,212,', 'rgba(91,184,245,', 'rgba(224,122,160,'];
const syms = ['✦','·','◦','∘','★','✧'];
const pts = Array.from({length:28}, () => ({
  x:  Math.random(),
  y:  Math.random() + 1,
  sz: Math.random() * 1.8 + 0.5,
  vy: -(Math.random() * 0.0005 + 0.00015),
  vx: (Math.random() - 0.5) * 0.00018,
  op: Math.random() * 0.5 + 0.15,
  s:  syms[Math.floor(Math.random() * syms.length)],
  col: ptColors[Math.floor(Math.random() * ptColors.length)]
}));

function drawPts() {
  ptX.clearRect(0, 0, ptC.width, ptC.height);
  pts.forEach(p => {
    p.y += p.vy;
    p.x += p.vx;
    if (p.y < -0.05) { p.y = 1.06; p.x = Math.random(); }
    ptX.font = `${p.sz * 10}px serif`;
    ptX.fillStyle = p.col + p.op + ')';
    ptX.fillText(p.s, p.x * ptC.width, p.y * ptC.height);
  });
}

/* ── SHOOTING STAR ── */
let shoot = null;
function launchShoot() {
  shoot = {
    x: Math.random() * 0.6,
    y: Math.random() * 0.3,
    len: Math.random() * 0.12 + 0.06,
    speed: Math.random() * 0.006 + 0.005,
    op: 1
  };
}
setTimeout(launchShoot, 3000);
setInterval(launchShoot, 8000 + Math.random() * 6000);

function drawShoot() {
  if (!shoot) return;
  shoot.x += shoot.speed;
  shoot.y += shoot.speed * 0.45;
  shoot.op -= 0.018;
  if (shoot.op <= 0) { shoot = null; return; }
  const x1 = shoot.x * bgC.width;
  const y1 = shoot.y * bgC.height;
  const x0 = x1 - shoot.len * bgC.width;
  const y0 = y1 - shoot.len * bgC.height * 0.45;
  const grd = bgX.createLinearGradient(x0, y0, x1, y1);
  grd.addColorStop(0, `rgba(255,255,255,0)`);
  grd.addColorStop(1, `rgba(255,255,255,${shoot.op})`);
  bgX.beginPath();
  bgX.moveTo(x0, y0);
  bgX.lineTo(x1, y1);
  bgX.strokeStyle = grd;
  bgX.lineWidth = 1.2;
  bgX.stroke();
}

/* ── LOOP ── */
let t = 0;
(function loop() {
  t++;
  drawStars(t);
  drawShoot();
  drawPts();
  requestAnimationFrame(loop);
})();

/* ── WORD REVEAL ── */
const lines = [
  [{t:"You've",b:false},{t:"already",b:false},{t:"proven",b:false},{t:"you",b:false},
   {t:"know",b:false},{t:"how",b:false},{t:"to",b:false},{t:"find",b:false},
   {t:"your",b:false},{t:"way",b:false},{t:"through.",b:false}],
  [{t:"This",b:true},{t:"exam",b:true},{t:"is",b:true},{t:"no",b:true},{t:"different.",b:true}]
];

const msgEl = document.getElementById('msg');
const allWords = [];

lines.forEach((line, li) => {
  if (li > 0) msgEl.appendChild(document.createElement('br'));
  line.forEach((w, wi) => {
    if (wi > 0) msgEl.appendChild(document.createTextNode(' '));
    const span = document.createElement('span');
    span.className = 'w' + (w.b ? ' str' : '');
    span.textContent = w.t;
    msgEl.appendChild(span);
    allWords.push(span);
  });
});

/* ── SEQUENCE ── */
const $ = id => document.getElementById(id);
setTimeout(() => $('ey').classList.add('show'), 350);
setTimeout(() => $('hl').classList.add('show'), 650);
setTimeout(() => $('dv').classList.add('open'), 1050);
setTimeout(() => document.querySelectorAll('.corner').forEach(c => c.classList.add('show')), 500);

const firstLen = lines[0].length;
allWords.forEach((w, i) => {
  const pause = i >= firstLen ? 600 : 0;
  setTimeout(() => w.classList.add('on'), 1700 + i * 110 + pause);
});

const endDelay = 1700 + allWords.length * 110 + 600 + 300;
setTimeout(() => $('wsh').classList.add('show'), endDelay);
setTimeout(() => $('nm').classList.add('show'),  endDelay + 450);
setTimeout(() => $('nt').classList.add('show'),  endDelay + 950);
</script>
</body>
</html>
